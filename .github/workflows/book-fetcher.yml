name: Daily Book Fetcher

on:
  schedule:
    - cron: '0 0,12 * * *'   # Twice daily at midnight and noon UTC
  workflow_dispatch: {}    # Can also be triggered manually from GitHub

jobs:
  fetch-books:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch books and save to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/book-fetcher/fetch-books.mjs
