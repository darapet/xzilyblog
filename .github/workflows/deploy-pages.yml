name: Deploy Xzily Blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API client/schemas
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Build frontend
        env:
          PORT: "4000"
          BASE_PATH: /xzilyblog/
        run: pnpm --filter @workspace/xzilyblog run build

      - name: Upload build
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/xzilyblog/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
