name: Deploy Xzily to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "artifacts/xzily-blog/**"
      - ".github/workflows/xzily-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site (drop dev-only files)
        run: |
          mkdir -p _site
          rsync -a --exclude 'node_modules' --exclude 'package.json' \
            --exclude 'vite.config.ts' --exclude '.replit-artifact' \
            artifacts/xzily-blog/ _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
