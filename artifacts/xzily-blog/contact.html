<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — The Educative Blog</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="site-navbar"></div>
    <main id="main">
      <div class="page-header">
        <div class="container">
          <div class="breadcrumb"><a href="index.html">HOME</a> / <span>CONTACT</span></div>
          <h1>Get in touch</h1>
          <p>Tips, pitches, corrections, or partnership inquiries &mdash; we read everything.</p>
        </div>
      </div>
      <div class="container contact-grid">
        <div>
          <div class="contact-info-item">
            <span class="icon-wrap" id="iconMail"></span>
            <div><h4>Email</h4><p id="contactEmail">hello@xzily.com</p></div>
          </div>
          <div class="contact-info-item">
            <span class="icon-wrap" id="iconPhone"></span>
            <div><h4>Phone</h4><p id="contactPhone">+1 (555) 019-2044</p></div>
          </div>
          <div class="contact-info-item">
            <span class="icon-wrap" id="iconMap"></span>
            <div><h4>Newsroom</h4><p id="contactAddress">Brooklyn, NY &mdash; remote-first team</p></div>
          </div>
        </div>
        <form id="contactForm">
          <div id="contactMsg" class="form-msg"></div>
          <div class="field"><label for="cName">Name</label><input id="cName" required /></div>
          <div class="field"><label for="cEmail">Email</label><input id="cEmail" type="email" required /></div>
          <div class="field"><label for="cSubject">Subject</label><input id="cSubject" required /></div>
          <div class="field"><label for="cMessage">Message</label><textarea id="cMessage" rows="5" required></textarea></div>
          <button class="btn btn-primary btn-block" type="submit">Send message</button>
        </form>
      </div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="js/contact.js"></script>
  </body>
</html>
