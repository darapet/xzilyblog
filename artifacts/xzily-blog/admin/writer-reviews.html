<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writer Reviews — Xzily Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="admin-shell">
      <div id="admin-sidebar-slot"></div>
      <main class="admin-main">
        <div class="admin-topbar">
          <div><h1 id="adminTitle">Writer Reviews</h1><p id="adminSub"></p></div>
        </div>

        <div class="admin-panel">
          <div id="reviewEmpty"></div>
          <div id="reviewList"></div>
        </div>
      </main>
    </div>

    <!-- Review Detail Modal -->
    <div class="ai-write-modal" id="reviewModal" style="display:none;">
      <div class="ai-write-card" style="max-width:620px;max-height:88vh;overflow-y:auto;">
        <h3 id="reviewModalTitle">Review Request</h3>
        <div id="reviewModalMeta" style="font-size:13px;color:var(--text-muted);margin-bottom:18px;"></div>
        <div id="reviewModalBody"></div>
        <div class="error" id="reviewModalError" style="display:none;margin-top:14px;"></div>
        <div class="ai-write-actions" style="margin-top:20px;">
          <button class="btn btn-outline" id="reviewModalClose">Close</button>
          <button class="btn btn-outline" id="reviewModalReject" style="color:var(--primary);border-color:var(--primary);">Reject</button>
          <button class="btn btn-primary" id="reviewModalApprove">Approve &amp; Restore</button>
        </div>
      </div>
    </div>

    <script type="module" src="../js/admin-writer-reviews.js"></script>
  </body>
</html>
