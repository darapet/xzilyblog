<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor Login — Xzily Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main id="main">
      <div class="auth-shell" style="min-height:100vh;">
        <div class="auth-card">
          <div class="brand"><span class="brand-mark">X</span>zily<span class="dot">.</span></div>
          <h1>Editor sign in</h1>
          <p class="sub">Restricted access for the Xzily editorial team.</p>
          <div id="adminLoginMsg" class="form-msg"></div>
          <form id="adminLoginForm">
            <div class="field"><label for="aEmail">Email</label><input id="aEmail" type="email" required /></div>
            <div class="field"><label for="aPassword">Password</label><input id="aPassword" type="password" required /></div>
            <button class="btn btn-primary btn-block" type="submit">Sign in to dashboard</button>
          </form>
          <p class="field-hint"><a href="../index.html">&larr; Back to Xzily</a></p>
        </div>
      </div>
    </main>
    <script type="module" src="../js/admin-login.js"></script>
  </body>
</html>
