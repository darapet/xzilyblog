<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Xzily Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="admin-shell">
      <div id="admin-sidebar-slot"></div>
      <main class="admin-main">
        <div class="admin-topbar">
          <div><h1 id="adminTitle">Dashboard</h1><p id="adminSub"></p></div>
          <a href="/admin/editor.html" class="btn btn-primary">+ New story</a>
        </div>
        <div class="stat-grid" id="statGrid"></div>
        <div class="admin-grid-2">
          <div class="admin-panel">
            <div class="admin-panel-head"><h3>Top performing stories</h3></div>
            <table class="data-table" id="topPostsTable"><thead><tr><th>Story</th><th>Views</th><th>Likes</th></tr></thead><tbody></tbody></table>
          </div>
          <div class="admin-panel">
            <div class="admin-panel-head"><h3>Recent activity</h3></div>
            <div id="activityFeed" style="display:flex;flex-direction:column;gap:16px;"></div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/js/admin-dashboard.js"></script>
  </body>
</html>
