<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xzily — FreeNews Edition</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to content</a>
    <div id="site-navbar"></div>

    <main id="main">
      <section class="magazine-hero">
        <div class="container">
          <div class="magazine-hero-layout" id="heroGrid">
            <!-- populated by home.js -->
          </div>
        </div>
      </section>

      <div class="container magazine-layout">
        <div class="main-column">
          <div class="block-header"><h2>Latest News</h2></div>
          <div class="grid grid-2" id="latestGrid"></div>

          <div class="block-header" style="margin-top: 40px;" id="bookmarksHeader"><h2>Saved for Later</h2></div>
          <div class="grid grid-2" id="bookmarkGrid"></div>
        </div>

        <aside class="sidebar-column">
          <div class="widget">
            <h3 class="widget-title">Trending Now</h3>
            <div class="trending-list" id="trendingList"></div>
          </div>
          
          <div class="widget">
            <h3 class="widget-title">Categories</h3>
            <div class="cat-list-widget" id="catGrid"></div>
          </div>

          <div class="widget newsletter-widget">
            <h3 class="widget-title">Subscribe</h3>
            <p>Never miss a story. Get our weekly newsletter.</p>
            <form class="newsletter-form" style="margin-top: 15px;">
              <input type="email" placeholder="Email address" required />
              <button class="btn btn-primary btn-block" type="submit" style="margin-top: 10px;">Sign Up</button>
            </form>
          </div>
        </aside>
      </div>
    </main>

    <div id="site-footer"></div>
    <script type="module" src="js/home.js"></script>
  </body>
</html>
