<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search — Xzily</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to content</a>
    <div id="site-navbar"></div>
    <main id="main">
      <div class="page-header">
        <div class="container">
          <div class="breadcrumb"><a href="/index.html">Home</a> / <span>Search</span></div>
          <h1>Search Xzily</h1>
          <form id="searchForm" style="margin-top:20px;max-width:480px;">
            <div class="nav-search-form" style="width:100%;padding:12px 16px;">
              <span></span>
              <input type="search" id="searchInput" placeholder="Search by title, tag, or topic&hellip;" />
              <button class="icon-btn" type="submit" style="border:none;background:none;">Go</button>
            </div>
          </form>
        </div>
      </div>
      <section class="section">
        <div class="container">
          <p id="resultCount" style="color:var(--ink-400);font-size:14px;margin-bottom:24px;"></p>
          <div class="grid grid-3 stagger reveal" id="resultsGrid"></div>
          <div id="resultsEmpty"></div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="/js/search.js"></script>
  </body>
</html>
