<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writer Registration — Xzily</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-card" style="max-width:540px;">
      <div class="auth-logo"><span class="brand-mark">X</span>zily<span class="dot">.</span></div>
      <h2 style="margin:0 0 4px;">Join as a Writer</h2>
      <p style="margin:0 0 24px;color:var(--text-muted);font-size:14px;">For invited contributors only. Fill in your details to create your writer account.</p>

      <form id="writerRegForm" autocomplete="off">
        <div class="admin-grid-2" style="gap:14px;">
          <div class="field"><label for="fFirst">First name <span style="color:#c62828">*</span></label><input id="fFirst" required placeholder="Ada" /></div>
          <div class="field"><label for="fMiddle">Middle name</label><input id="fMiddle" placeholder="Optional" /></div>
        </div>
        <div class="admin-grid-2" style="gap:14px;">
          <div class="field"><label for="fLast">Last name <span style="color:#c62828">*</span></label><input id="fLast" required placeholder="Lovelace" /></div>
          <div class="field"><label for="fAuthorName">Author / pen name <span style="color:#c62828">*</span></label><input id="fAuthorName" required placeholder="Name shown on articles" /></div>
        </div>
        <div class="field"><label for="fAddress">Address</label><input id="fAddress" placeholder="City, Country" /></div>
        <div class="admin-grid-2" style="gap:14px;">
          <div class="field"><label for="fPhone">Phone number</label><input id="fPhone" type="tel" placeholder="+251 9XX XXX XXX" /></div>
          <div class="field"><label for="fEmail">Email address <span style="color:#c62828">*</span></label><input id="fEmail" type="email" required placeholder="you@example.com" /></div>
        </div>
        <div class="admin-grid-2" style="gap:14px;">
          <div class="field"><label for="fPass">Password <span style="color:#c62828">*</span></label><input id="fPass" type="password" required placeholder="Min. 8 characters" minlength="8" /></div>
          <div class="field"><label for="fPass2">Confirm password <span style="color:#c62828">*</span></label><input id="fPass2" type="password" required placeholder="Repeat password" /></div>
        </div>
        <p id="regError" style="display:none;color:#c62828;font-size:13px;margin:0 0 12px;"></p>
        <button class="btn btn-primary" type="submit" id="regBtn" style="width:100%;margin-top:4px;">Create writer account</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:13.5px;color:var(--text-muted);">
        Already have an account? <a href="writer/login.html" style="color:var(--primary);font-weight:600;">Sign in</a>
      </p>
    </div>
    <script type="module" src="js/writer-register.js"></script>
  </body>
</html>
