<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Xzily Writer</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="admin-shell">
      <div id="writer-sidebar-slot"></div>
      <main class="admin-main">
        <div class="admin-topbar">
          <div><h1 id="writerTitle">My Dashboard</h1><p id="writerSub">Welcome back</p></div>
          <a class="btn btn-primary" href="editor.html">+ New Story</a>
        </div>

        <!-- Stat cards -->
        <div class="stat-grid" id="statGrid">
          <div class="stat-card"><div class="stat-val" id="statTotal">—</div><div class="stat-label">Total stories</div></div>
          <div class="stat-card"><div class="stat-val" id="statPublished">—</div><div class="stat-label">Published</div></div>
          <div class="stat-card"><div class="stat-val" id="statDrafts">—</div><div class="stat-label">Drafts</div></div>
          <div class="stat-card"><div class="stat-val" id="statViews">—</div><div class="stat-label">Total views</div></div>
        </div>

        <!-- Recent stories -->
        <div class="admin-panel" style="margin-top:24px;">
          <div class="admin-panel-head">
            <h3>Recent stories</h3>
            <a href="posts.html" style="font-size:13.5px;color:var(--primary);">View all →</a>
          </div>
          <div id="recentPostsEmpty"></div>
          <table class="admin-table" id="recentTable" style="display:none;">
            <thead><tr><th>Title</th><th>Status</th><th>Views</th><th>Date</th><th></th></tr></thead>
            <tbody id="recentBody"></tbody>
          </table>
        </div>
      </main>
    </div>
    <script type="module" src="../js/writer-index.js"></script>
  </body>
</html>
