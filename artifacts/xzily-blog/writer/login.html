<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writer Sign In — Xzily</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><span class="brand-mark">X</span>zily<span class="dot">.</span></div>
      <h2 style="margin:0 0 4px;">Writer Sign In</h2>
      <p style="margin:0 0 24px;color:var(--text-muted);font-size:14px;">Sign in to your writer dashboard.</p>
      <form id="writerLoginForm">
        <div class="field"><label for="wEmail">Email</label><input id="wEmail" type="email" required placeholder="you@example.com" /></div>
        <div class="field"><label for="wPass">Password</label><input id="wPass" type="password" required placeholder="••••••••" /></div>
        <p id="loginError" style="display:none;color:#c62828;font-size:13px;margin:0 0 12px;"></p>
        <button class="btn btn-primary" type="submit" id="loginBtn" style="width:100%;">Sign in to dashboard</button>
      </form>
      <p style="text-align:center;margin-top:18px;font-size:13.5px;color:var(--text-muted);">
        Not registered yet? Ask your editor for the registration link.
      </p>
    </div>
    <script type="module" src="../js/writer-login.js"></script>
  </body>
</html>
