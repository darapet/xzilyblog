<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read — Xzily Library</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/library.css" />
</head>
<body>
<div id="site-navbar"></div>

<div class="lib-wrap">
  <div class="container">

    <!-- Loading -->
    <div id="loadingState" style="padding:80px 0;text-align:center;color:var(--text-muted)">
      <div style="font-size:2rem;margin-bottom:12px">📖</div>Loading book…
    </div>

    <!-- Error -->
    <div id="errorState" style="display:none;padding:80px 0;text-align:center">
      <div style="font-size:3rem;margin-bottom:16px">📭</div>
      <h3 style="font-family:var(--font-condensed);text-transform:uppercase;margin-bottom:10px">Book Not Found</h3>
      <p style="color:var(--text-muted);margin-bottom:24px">This book may have been removed or the link is incorrect.</p>
      <a href="library.html" class="btn btn-primary">Back to Library</a>
    </div>

    <!-- Main reader layout -->
    <div class="lib-reader-wrap" id="readerWrap" style="display:none">

      <!-- LEFT: Book + reader + comments -->
      <div class="lib-reader-main">

        <!-- Book header -->
        <div class="lib-book-header" id="bookHeader">
          <div class="lib-book-cover-lg" id="coverLg">📚</div>
          <div class="lib-book-header-info">
            <div class="lib-book-header-title" id="bookTitle">…</div>
            <div class="lib-book-header-author" id="bookAuthor"></div>
            <div class="lib-book-header-meta" id="bookMeta"></div>
            <div class="lib-book-actions" id="bookActions"></div>
          </div>
        </div>

        <!-- Description -->
        <div class="lib-panel" id="descPanel" style="display:none">
          <div class="lib-panel-title">About this Book</div>
          <p id="bookDesc" style="color:var(--text-muted);line-height:1.7;font-size:14px;margin:0"></p>
        </div>

        <!-- Reader content (PDF embed or external link) -->
        <div id="readerContent"></div>

        <!-- Comments -->
        <div class="lib-panel">
          <div class="lib-panel-title">Comments</div>
          <div class="lib-comment-form">
            <input class="lib-comment-name" id="commentName" placeholder="Your name (optional — defaults to Anonymous)" />
            <textarea class="lib-comment-input" id="commentText" placeholder="Share your thoughts about this book…"></textarea>
            <div style="display:flex;justify-content:flex-end;margin-top:8px">
              <button class="btn btn-primary" id="commentBtn" style="font-size:13px">Post Comment</button>
            </div>
          </div>
          <div id="commentList"></div>
        </div>

      </div>

      <!-- RIGHT: Sidebar -->
      <div class="lib-reader-sidebar">

        <!-- Uploader box -->
        <div class="lib-sidebar-box" id="uploaderBox" style="display:none">
          <div class="lib-sidebar-box-title">Uploaded by</div>
          <div class="lib-uploader-row" id="uploaderRow"></div>
          <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap" id="uploaderActions"></div>
        </div>

        <!-- Stats -->
        <div class="lib-sidebar-box">
          <div class="lib-sidebar-box-title">Book Stats</div>
          <div class="lib-stats-mini">
            <div class="lib-stat-mini"><div class="lib-stat-mini-num" id="statViews">0</div><div class="lib-stat-mini-lbl">Views</div></div>
            <div class="lib-stat-mini"><div class="lib-stat-mini-num" id="statLikes">0</div><div class="lib-stat-mini-lbl">Likes</div></div>
            <div class="lib-stat-mini"><div class="lib-stat-mini-num" id="statComments">0</div><div class="lib-stat-mini-lbl">Comments</div></div>
          </div>
        </div>

        <!-- Share -->
        <div class="lib-sidebar-box">
          <div class="lib-sidebar-box-title">Share this Book</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="lib-action-btn" id="shareWhatsApp">📲 WhatsApp</button>
            <button class="lib-action-btn" id="shareCopy">🔗 Copy Link</button>
          </div>
        </div>

        <!-- Back link -->
        <div style="text-align:center;padding-top:8px">
          <a href="library.html" style="font-size:13px;color:var(--text-muted)">← Back to Library</a>
        </div>

      </div>
    </div>

  </div>
</div>

<div id="site-footer"></div>

<script type="module">
import { mountLayout, formatCount, toast } from './js/common.js';
import { libStore, getCategoryBySlug } from './js/library-store.js';
import { store } from './js/store.js';

const params = new URLSearchParams(location.search);
const bookId = params.get('id');

function esc(s = '') { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(n = '') { return n.split(' ').map(w => w[0]||'').join('').toUpperCase().slice(0,2)||'?'; }
function avHtml(p) {
  return p?.avatarUrl
    ? `<img src="${esc(p.avatarUrl)}" alt="${esc(p.displayName)}" />`
    : `<span style="font-size:13px;font-weight:800">${initials(p?.displayName||'?')}</span>`;
}

await mountLayout('library.html');
if (!bookId) { showError(); } else { loadBook(); }

async function loadBook() {
  try {
    const [book, session] = await Promise.all([
      libStore.getBookById(bookId),
      store.getSession(),
    ]);
    if (!book || book.status !== 'published') { showError(); return; }

    document.title = book.title + ' — Xzily Library';
    libStore.incrementViews(bookId);

    // Cover
    const coverEl = document.getElementById('coverLg');
    const cat = getCategoryBySlug(book.category);
    if (book.coverUrl) {
      coverEl.innerHTML = `<img src="${esc(book.coverUrl)}" alt="${esc(book.title)}" onerror="this.style.display='none'" />`;
    } else {
      coverEl.textContent = cat.icon;
    }

    // Header info
    document.getElementById('bookTitle').textContent  = book.title;
    document.getElementById('bookAuthor').textContent = 'by ' + (book.authorName || 'Unknown Author');
    document.getElementById('bookMeta').innerHTML = [
      `<span class="lib-book-meta-tag cat">${cat.icon} ${cat.name}</span>`,
      `<span class="lib-book-meta-tag">${esc(book.language)}</span>`,
      book.publishedYear ? `<span class="lib-book-meta-tag">${book.publishedYear}</span>` : '',
      book.isExternal ? '<span class="lib-book-meta-tag">External Source</span>' : '<span class="lib-book-meta-tag">PDF</span>',
    ].filter(Boolean).join('');

    // Stats
    document.getElementById('statViews').textContent    = formatCount(book.views + 1);
    document.getElementById('statLikes').textContent    = formatCount(book.likesCount);
    document.getElementById('statComments').textContent = formatCount(book.commentsCount);

    // Actions
    const actionsEl = document.getElementById('bookActions');

    // Open external button
    if (book.isExternal && book.externalUrl) {
      const openBtn = document.createElement('a');
      openBtn.className  = 'lib-action-btn primary';
      openBtn.href       = book.externalUrl;
      openBtn.target     = '_blank';
      openBtn.rel        = 'noopener';
      openBtn.innerHTML  = '🌐 Open Book';
      actionsEl.appendChild(openBtn);
    }

    // Like button
    let likedNow = session ? await libStore.getLikeStatus(bookId, session.id).catch(() => false) : false;
    const likeBtn = document.createElement('button');
    function updateLikeBtn() {
      likeBtn.className = `lib-action-btn${likedNow ? ' liked' : ''}`;
      likeBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="${likedNow?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg> <span id="likeCount">${formatCount(parseInt(document.getElementById('statLikes').textContent.replace(/,/g,''))||0)}</span>`;
    }
    updateLikeBtn();
    likeBtn.addEventListener('click', async () => {
      if (!session) { toast('Sign in to like books'); return; }
      likedNow = await libStore.toggleLike(bookId, session.id);
      const cur = parseInt(document.getElementById('statLikes').textContent.replace(/,/g,'')) || 0;
      const next = Math.max(0, cur + (likedNow ? 1 : -1));
      document.getElementById('statLikes').textContent = formatCount(next);
      updateLikeBtn();
    });
    actionsEl.appendChild(likeBtn);

    // Description
    if (book.description) {
      document.getElementById('descPanel').style.display = '';
      document.getElementById('bookDesc').textContent = book.description;
    }

    // Reader content
    const contentEl = document.getElementById('readerContent');
    if (book.isExternal && book.externalUrl) {
      contentEl.innerHTML = `
        <div class="lib-external-box">
          <div class="ext-icon">🌐</div>
          <h3>External Book</h3>
          <p>This book is hosted on an external website. Click the button below to open it in a new tab.</p>
          <a href="${esc(book.externalUrl)}" target="_blank" rel="noopener" class="btn btn-primary">Open External Book</a>
        </div>`;
    } else if (book.fileUrl) {
      contentEl.innerHTML = `
        <div class="lib-pdf-wrap">
          <iframe class="lib-pdf-frame" src="${esc(book.fileUrl)}" title="${esc(book.title)}"></iframe>
        </div>`;
    } else {
      contentEl.innerHTML = `
        <div class="lib-panel" style="text-align:center;padding:60px 40px">
          <div style="font-size:3rem;margin-bottom:16px">📄</div>
          <div style="font-family:var(--font-condensed);font-size:20px;text-transform:uppercase;margin-bottom:8px">No File Yet</div>
          <p style="color:var(--text-muted)">The uploader has not attached a file to this book yet.</p>
        </div>`;
    }

    // Uploader profile
    if (book.uploaderId) {
      const profile = await libStore.getProfile(book.uploaderId).catch(() => null);
      if (profile) {
        document.getElementById('uploaderBox').style.display = '';
        document.getElementById('uploaderRow').innerHTML = `
          <div class="lib-uploader-av">${avHtml(profile)}</div>
          <div>
            <div class="lib-uploader-name">${esc(profile.displayName)}</div>
            <div class="lib-uploader-sub">${formatCount(profile.booksCount)} book${profile.booksCount !== 1?'s':''} · ${formatCount(profile.followersCount)} follower${profile.followersCount !== 1?'s':''}</div>
          </div>`;

        const upAct = document.getElementById('uploaderActions');

        const viewBtn = document.createElement('a');
        viewBtn.className = 'lib-action-btn';
        viewBtn.href = `library-host-profile.html?uid=${book.uploaderId}`;
        viewBtn.textContent = 'View Profile';
        upAct.appendChild(viewBtn);

        if (session && session.id !== book.uploaderId) {
          let isFollowing = await libStore.getFollowStatus(session.id, book.uploaderId).catch(() => false);
          const followBtn = document.createElement('button');
          function updateFollowBtn() {
            followBtn.className = `lib-follow-btn ${isFollowing ? 'following' : 'not-following'}`;
            followBtn.textContent = isFollowing ? 'Following' : '+ Follow';
          }
          updateFollowBtn();
          followBtn.addEventListener('click', async () => {
            isFollowing = await libStore.toggleFollow(session.id, book.uploaderId);
            updateFollowBtn();
            toast(isFollowing ? 'Now following ' + profile.displayName : 'Unfollowed');
          });
          upAct.appendChild(followBtn);
        }
      }
    }

    // Share
    const pageUrl = location.href;
    document.getElementById('shareWhatsApp').addEventListener('click', () => {
      window.open(`https://wa.me/?text=${encodeURIComponent(book.title + ' — ' + pageUrl)}`, '_blank');
    });
    document.getElementById('shareCopy').addEventListener('click', () => {
      navigator.clipboard.writeText(pageUrl).then(() => toast('Link copied!')).catch(() => {});
    });

    // Load comments
    loadComments(session);
    document.getElementById('commentBtn').addEventListener('click', async () => {
      const text = document.getElementById('commentText').value.trim();
      if (!text) return;
      const name = document.getElementById('commentName').value.trim() || session?.name || 'Anonymous';
      const btn = document.getElementById('commentBtn');
      btn.disabled = true; btn.textContent = 'Posting…';
      try {
        await libStore.addComment(bookId, null, session?.id || null, name, text);
        document.getElementById('commentText').value = '';
        toast('Comment posted!');
        const cur = parseInt(document.getElementById('statComments').textContent.replace(/,/g,'')) || 0;
        document.getElementById('statComments').textContent = cur + 1;
        loadComments(session);
      } catch (e) { toast('Error: ' + e.message); }
      btn.disabled = false; btn.textContent = 'Post Comment';
    });

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('readerWrap').style.display = '';

  } catch (e) { showError(); }
}

async function loadComments(session) {
  const list = document.getElementById('commentList');
  try {
    const comments = await libStore.getComments(bookId);
    if (!comments.length) {
      list.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:24px 0;font-size:13px">No comments yet — be the first!</p>`;
      return;
    }
    list.innerHTML = comments.map(c => commentHtml(c)).join('');
    list.querySelectorAll('[data-reply-btn]').forEach(btn => {
      btn.addEventListener('click', () => {
        const form = document.getElementById('rf-' + btn.dataset.replyBtn);
        if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
      });
    });
    list.querySelectorAll('[data-reply-submit]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const cid = btn.dataset.replySubmit;
        const inp = document.getElementById('ri-' + cid);
        const text = inp?.value.trim();
        if (!text) return;
        btn.disabled = true; btn.textContent = '…';
        try {
          await libStore.addComment(bookId, cid, session?.id || null, session?.name || 'Anonymous', text);
          toast('Reply posted!');
          loadComments(session);
        } catch (e) { toast('Error: ' + e.message); }
        btn.disabled = false; btn.textContent = 'Reply';
      });
    });
  } catch (e) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:13px">Could not load comments.</p>';
  }
}

function commentHtml(c) {
  const ts = c.createdAt ? new Date(c.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '';
  const repliesHtml = c.replies.length ? `
    <div class="lib-reply-thread">
      ${c.replies.map(r => `
        <div style="padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span style="font-size:12px;font-weight:700;color:var(--primary)">${esc(r.displayName)}</span>
            <span style="font-size:11px;color:var(--text-muted)">${r.createdAt ? new Date(r.createdAt).toLocaleDateString() : ''}</span>
          </div>
          <div style="font-size:13px;line-height:1.6">${esc(r.text)}</div>
        </div>`).join('')}
    </div>` : '';
  return `
  <div class="lib-comment-item">
    <div class="lib-comment-head">
      <div class="lib-comment-av">${initials(c.displayName)}</div>
      <span class="lib-comment-author">${esc(c.displayName)}</span>
      <span class="lib-comment-time">${ts}</span>
    </div>
    <div class="lib-comment-text">${esc(c.text)}</div>
    <button class="lib-comment-reply-btn" data-reply-btn="${c.id}">↩ Reply</button>
    ${repliesHtml}
    <div class="lib-reply-form" id="rf-${c.id}" style="display:none;margin-top:8px">
      <input class="lib-reply-input" id="ri-${c.id}" placeholder="Write a reply…" />
      <button class="btn btn-primary" style="font-size:12px;padding:6px 14px" data-reply-submit="${c.id}">Reply</button>
    </div>
  </div>`;
}

function showError() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display   = '';
}
</script>
</body>
</html>
