<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — Xzily</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="site-navbar"></div>
    <main id="main">
      <div class="auth-shell">
        <div class="auth-card">
          <div class="brand">XZILY<span class="dot">.</span></div>
          <h1>Create your account</h1>
          <p class="sub">Join Xzily to save stories and join the conversation.</p>
          <div id="registerMsg" class="form-msg"></div>
          <form id="registerForm">
            <div class="field"><label for="regName">Full name</label><input id="regName" required /></div>
            <div class="field"><label for="regEmail">Email</label><input id="regEmail" type="email" required /></div>
            <div class="field"><label for="regPassword">Password</label><input id="regPassword" type="password" required minlength="4" /></div>
            <button class="btn btn-primary btn-block" type="submit">Create account</button>
          </form>
          <p class="field-hint">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="js/auth-pages.js"></script>
  </body>
</html>
