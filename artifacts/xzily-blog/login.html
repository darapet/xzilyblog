<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — The Educative Blog</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="site-navbar"></div>
    <main id="main">
      <div class="auth-shell">
        <div class="auth-card">
          <div class="brand">THE EDUCATIVE BLOG<span class="dot">.</span></div>
          <h1>Welcome back</h1>
          <p class="sub">Sign in to like, bookmark, and comment on stories.</p>
          <div id="loginMsg" class="form-msg"></div>
          <form id="loginForm">
            <div class="field"><label for="loginEmail">Email</label><input id="loginEmail" type="email" required /></div>
            <div class="field"><label for="loginPassword">Password</label><input id="loginPassword" type="password" required minlength="4" /></div>
            <button class="btn btn-primary btn-block" type="submit">Sign in</button>
          </form>
          <p class="field-hint">No account yet? <a href="register.html">Create one</a></p>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="js/auth-pages.js"></script>
  </body>
</html>
